<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dinner Roulette</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --pink: #FFB5C2;
    --mint: #B8E8D0;
    --lavender: #C5B9F2;
    --peach: #FFDAB3;
    --blue: #B3D9FF;
    --yellow: #FFF2B3;
    --bg: #FFF5F7;
    --card-bg: #FFFFFF;
    --text: #5A4E6B;
    --text-light: #8B7FA3;
    --border: #f0e0e8;
  }

  [data-theme="dark"] {
    --pink: #E89AB0;
    --mint: #8FC9B0;
    --lavender: #A89AD6;
    --peach: #E8B888;
    --blue: #8FB8E0;
    --yellow: #E8D888;
    --bg: #2B2438;
    --card-bg: #3D3450;
    --text: #F5EDF7;
    --text-light: #C5B9D0;
    --border: #4A3F5E;
  }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 100px;
    transition: background 0.3s, color 0.3s;
  }

  .nav {
    display: flex;
    justify-content: center;
    gap: 6px;
    padding: 14px 10px;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
    border-bottom: 2px solid var(--border);
    flex-wrap: wrap;
  }
  .nav button {
    background: var(--card-bg);
    border: 2px solid var(--border);
    border-radius: 20px;
    padding: 9px 16px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    cursor: pointer;
    transition: all 0.2s;
  }
  .nav button.active {
    background: var(--pink);
    border-color: var(--pink);
    color: white;
  }
  .nav button:hover { transform: scale(1.05); }

  .theme-toggle {
    position: fixed;
    top: 14px;
    right: 14px;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: var(--card-bg);
    cursor: pointer;
    font-size: 18px;
    z-index: 200;
  }

  .header {
    text-align: center;
    padding: 26px 20px 6px;
  }
  .mascot {
    font-size: 50px;
    animation: bob 2.5s ease-in-out infinite;
    display: inline-block;
  }
  @keyframes bob {
    0%, 100% { transform: translateY(0) rotate(-3deg); }
    50% { transform: translateY(-8px) rotate(3deg); }
  }
  .mascot-speech {
    background: var(--card-bg);
    border: 2px solid var(--border);
    border-radius: 20px;
    padding: 8px 16px;
    display: inline-block;
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    margin-left: 10px;
    position: relative;
    vertical-align: middle;
  }
  .mascot-speech::before {
    content: '';
    position: absolute;
    left: -8px;
    top: 50%;
    transform: translateY(-50%);
    border: 6px solid transparent;
    border-right-color: var(--card-bg);
  }
  .header h1 {
    font-size: 32px;
    font-weight: 900;
    margin-top: 6px;
    background: linear-gradient(135deg, var(--pink), var(--lavender), var(--blue));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .page { display: none; padding: 20px; max-width: 560px; margin: 0 auto; }
  .page.active { display: block; }

  .recipe-card {
    background: var(--card-bg);
    border-radius: 20px;
    padding: 18px;
    margin-bottom: 14px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    border: 2px solid transparent;
    transition: all 0.2s;
  }
  .recipe-card:hover { border-color: var(--pink); }
  .recipe-card-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }
  .recipe-emoji { font-size: 32px; flex-shrink: 0; }
  .recipe-card h3 { font-size: 18px; font-weight: 800; flex: 1; }
  .recipe-card .ingredients {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 8px;
  }
  .recipe-card .ingredient-tag {
    background: var(--bg);
    padding: 4px 12px;
    border-radius: 12px;
    font-size: 13px;
    color: var(--text-light);
  }
  .card-actions {
    display: flex;
    gap: 6px;
    align-items: center;
    margin-top: 12px;
    flex-wrap: wrap;
  }
  .star-rating { display: flex; gap: 2px; }
  .star {
    cursor: pointer;
    font-size: 20px;
    color: #ddd;
    transition: transform 0.1s;
    user-select: none;
  }
  .star:hover { transform: scale(1.2); }
  .star.filled { color: #FFC940; }
  .fav-btn {
    background: none;
    border: none;
    font-size: 22px;
    cursor: pointer;
    padding: 4px;
    transition: transform 0.1s;
  }
  .fav-btn:hover { transform: scale(1.2); }
  .delete-btn {
    margin-left: auto;
    background: none;
    border: none;
    font-size: 18px;
    cursor: pointer;
    opacity: 0.4;
    color: var(--text);
  }
  .delete-btn:hover { opacity: 1; }

  .card-color-0 { border-left: 4px solid var(--pink); }
  .card-color-1 { border-left: 4px solid var(--mint); }
  .card-color-2 { border-left: 4px solid var(--lavender); }
  .card-color-3 { border-left: 4px solid var(--peach); }
  .card-color-4 { border-left: 4px solid var(--blue); }

  .form-group { margin-bottom: 16px; }
  .form-group label {
    font-weight: 700;
    font-size: 14px;
    display: block;
    margin-bottom: 6px;
  }
  input[type="text"], input[type="number"] {
    width: 100%;
    padding: 14px 18px;
    border: 2px solid var(--border);
    border-radius: 16px;
    font-family: inherit;
    font-size: 16px;
    background: var(--card-bg);
    color: var(--text);
    outline: none;
  }
  input[type="text"]:focus, input[type="number"]:focus { border-color: var(--lavender); }

  .suggested-ingredients {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 10px;
  }
  .chip {
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    border: 2px solid var(--border);
    background: var(--card-bg);
    color: var(--text);
    user-select: none;
  }
  .chip.selected {
    background: var(--mint);
    border-color: var(--mint);
    color: white;
  }
  .chip:hover { transform: scale(1.05); }

  .add-custom-ingredient {
    display: flex;
    gap: 8px;
    margin-top: 10px;
  }
  .add-custom-ingredient input { flex: 1; }
  .add-custom-ingredient button {
    padding: 10px 18px;
    border-radius: 16px;
    border: none;
    background: var(--lavender);
    color: white;
    font-family: inherit;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
  }

  .btn {
    display: block;
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 20px;
    font-family: inherit;
    font-size: 17px;
    font-weight: 800;
    cursor: pointer;
    margin-top: 12px;
  }
  .btn:hover { transform: scale(1.02); }
  .btn-pink { background: var(--pink); color: white; }
  .btn-mint { background: var(--mint); color: white; }
  .btn-lavender { background: var(--lavender); color: white; }
  .btn-peach { background: var(--peach); color: white; }
  .btn-small {
    display: inline-block;
    width: auto;
    padding: 10px 20px;
    font-size: 14px;
    margin-top: 0;
  }

  .spin-mode-toggle {
    display: flex;
    gap: 6px;
    margin-bottom: 20px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .spin-mode-toggle button {
    padding: 8px 16px;
    border-radius: 16px;
    border: 2px solid var(--border);
    background: var(--card-bg);
    color: var(--text);
    font-family: inherit;
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
  }
  .spin-mode-toggle button.active {
    background: var(--lavender);
    border-color: var(--lavender);
    color: white;
  }
  .spin-area { text-align: center; padding: 10px 0 20px; }
  .spin-button {
    width: 200px;
    height: 200px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--pink), var(--lavender));
    border: none;
    font-family: inherit;
    font-size: 28px;
    font-weight: 900;
    color: white;
    cursor: pointer;
    box-shadow: 0 8px 30px rgba(197,185,242,0.4);
  }
  .spin-button:hover { transform: scale(1.08); }
  .spin-button:active { transform: scale(0.95); }
  .spin-button.spinning { animation: pulse 0.3s ease-in-out infinite; }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }

  .roulette-display {
    margin: 30px 0;
    min-height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .roulette-card {
    background: var(--card-bg);
    border-radius: 24px;
    padding: 20px 30px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    font-size: 22px;
    font-weight: 800;
    text-align: center;
    border: 3px solid var(--pink);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .roulette-card.shuffling {
    animation: shuffle 0.15s ease-in-out;
  }
  @keyframes shuffle {
    0% { transform: translateY(-20px) scale(0.9); opacity: 0.3; }
    100% { transform: translateY(0) scale(1); opacity: 1; }
  }

  .celebration-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 1000;
    background: var(--bg);
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .celebration-overlay.active { display: flex; }
  .winner-emoji {
    font-size: 80px;
    animation: winnerBounce 0.4s ease-in-out infinite alternate;
  }
  @keyframes winnerBounce {
    0% { transform: translateY(0) scale(1) rotate(-5deg); }
    100% { transform: translateY(-20px) scale(1.15) rotate(5deg); }
  }
  .winner-text {
    font-size: 42px;
    font-weight: 900;
    text-align: center;
    margin-top: 10px;
    animation: sixSeven 0.4s ease-in-out infinite alternate;
    background: linear-gradient(135deg, var(--pink), var(--lavender));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .winner-sub {
    font-size: 18px;
    color: var(--text-light);
    margin-top: 10px;
  }
  @keyframes sixSeven {
    0% { transform: translateY(0) scale(1); }
    100% { transform: translateY(-10px) scale(1.08); }
  }
  .six-seven-hands {
    font-size: 50px;
    animation: handsUp 0.3s ease-in-out infinite alternate;
    margin-top: 16px;
  }
  @keyframes handsUp {
    0% { transform: translateY(0) rotate(-10deg); }
    100% { transform: translateY(-15px) rotate(10deg); }
  }
  .close-celebration {
    margin-top: 30px;
    padding: 14px 40px;
    border-radius: 20px;
    border: none;
    background: var(--pink);
    color: white;
    font-family: inherit;
    font-size: 18px;
    font-weight: 800;
    cursor: pointer;
  }

  .confetti-piece {
    position: fixed;
    width: 10px;
    height: 10px;
    border-radius: 3px;
    z-index: 1001;
    pointer-events: none;
  }
  @keyframes confettiFall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }

  .grocery-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    background: var(--card-bg);
    border-radius: 14px;
    margin-bottom: 8px;
    font-size: 16px;
    cursor: pointer;
    user-select: none;
  }
  .grocery-item.checked {
    text-decoration: line-through;
    opacity: 0.5;
  }
  .grocery-check {
    width: 24px;
    height: 24px;
    border-radius: 8px;
    border: 2px solid var(--pink);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 14px;
  }
  .grocery-item.checked .grocery-check {
    background: var(--pink);
    color: white;
  }
  .grocery-amount {
    margin-left: auto;
    font-weight: 700;
    color: var(--text-light);
    font-size: 14px;
  }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-light);
  }
  .empty-state .emoji { font-size: 48px; margin-bottom: 12px; }

  .calendar-day {
    background: var(--card-bg);
    border-radius: 16px;
    padding: 14px 16px;
    border-left: 4px solid var(--lavender);
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    margin-bottom: 10px;
  }
  .calendar-day:hover { transform: translateX(3px); }
  .calendar-day-name {
    font-weight: 800;
    font-size: 14px;
    width: 70px;
    color: var(--text-light);
    flex-shrink: 0;
  }
  .calendar-day-meal {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .calendar-day-empty {
    color: var(--text-light);
    font-style: italic;
    font-size: 14px;
  }
  .calendar-day-emoji { font-size: 22px; }
  .calendar-clear {
    background: none;
    border: none;
    font-size: 16px;
    opacity: 0.4;
    cursor: pointer;
    color: var(--text);
  }

  .history-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    background: var(--card-bg);
    border-radius: 14px;
    margin-bottom: 8px;
  }
  .history-date {
    color: var(--text-light);
    font-size: 12px;
    margin-left: auto;
  }

  .setting-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    background: var(--card-bg);
    border-radius: 16px;
    margin-bottom: 10px;
    gap: 12px;
  }
  .setting-row label {
    font-weight: 700;
    font-size: 15px;
    flex: 1;
  }
  .setting-row input[type="number"] {
    width: 80px;
    text-align: center;
    padding: 10px;
  }
  .toggle-switch {
    width: 50px;
    height: 28px;
    background: var(--border);
    border-radius: 14px;
    position: relative;
    cursor: pointer;
    flex-shrink: 0;
  }
  .toggle-switch.on { background: var(--mint); }
  .toggle-switch::after {
    content: '';
    width: 22px;
    height: 22px;
    background: white;
    border-radius: 50%;
    position: absolute;
    top: 3px;
    left: 3px;
    transition: left 0.2s;
  }
  .toggle-switch.on::after { left: 25px; }

  .modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.4);
    z-index: 500;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: var(--card-bg);
    border-radius: 20px;
    padding: 20px;
    max-width: 400px;
    width: 100%;
    max-height: 80vh;
    overflow-y: auto;
  }
  .modal h3 {
    font-size: 20px;
    font-weight: 800;
    margin-bottom: 14px;
  }
  .modal-recipe-btn {
    display: block;
    padding: 12px 14px;
    background: var(--bg);
    border-radius: 12px;
    margin-bottom: 6px;
    cursor: pointer;
    border: none;
    width: 100%;
    font-family: inherit;
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    text-align: left;
  }
  .modal-recipe-btn:hover { background: var(--pink); color: white; }

  @media (max-width: 400px) {
    .header h1 { font-size: 26px; }
    .spin-button { width: 170px; height: 170px; font-size: 24px; }
    .winner-text { font-size: 32px; }
    .winner-emoji { font-size: 60px; }
  }
</style>
</head>
<body>

<button class="theme-toggle" onclick="toggleTheme()" id="theme-btn">&#x1F319;</button>

<nav class="nav">
  <button class="active" onclick="showPage('recipes')">Recipes</button>
  <button onclick="showPage('spin')">Spin!</button>
  <button onclick="showPage('calendar')">Week</button>
  <button onclick="showPage('grocery')">Shop</button>
  <button onclick="showPage('settings')">Settings</button>
</nav>

<div class="header">
  <span class="mascot" id="mascot">&#x1F469;&#x200D;&#x1F373;</span>
  <span class="mascot-speech" id="mascot-speech">What's cooking?</span>
  <h1>Dinner Roulette</h1>
</div>

<div id="page-recipes" class="page active">
  <div class="form-group">
    <label>Recipe Name</label>
    <input type="text" id="recipe-name" placeholder="e.g. Pasta Bolognese" oninput="activeRecipeMatch = null; suggestIngredients()">
  </div>

  <div id="match-bar" class="suggested-ingredients" style="display:none; margin-bottom: 12px;"></div>

  <div id="suggestions-area" style="display:none">
    <div class="form-group">
      <label>Suggested Ingredients (tap to select)</label>
      <div id="suggested-chips" class="suggested-ingredients"></div>
    </div>
  </div>

  <div class="form-group">
    <label>Add Your Own Ingredient</label>
    <div class="add-custom-ingredient">
      <input type="text" id="custom-ingredient" placeholder="e.g. garlic">
      <button onclick="addCustomIngredient()">+ Add</button>
    </div>
  </div>

  <div id="selected-ingredients" class="suggested-ingredients" style="margin-bottom: 16px;"></div>

  <button class="btn btn-pink" onclick="saveRecipe()">Save Recipe</button>

  <div style="margin-top: 30px;">
    <h2 style="font-size: 20px; font-weight: 900; margin-bottom: 14px;">Your Recipes</h2>
    <div class="suggested-ingredients" style="margin-bottom: 14px;">
      <div class="chip selected" onclick="setFilter('all')" id="filter-all">All</div>
      <div class="chip" onclick="setFilter('fav')" id="filter-fav">&#x2764;&#xFE0F; Favorites</div>
      <div class="chip" onclick="setFilter('top')" id="filter-top">&#x2B50; Top Rated</div>
    </div>
    <div id="recipes-list"></div>
  </div>
</div>

<div id="page-spin" class="page">
  <div class="spin-mode-toggle">
    <button class="active" onclick="setSpinMode('all')" id="mode-all">All</button>
    <button onclick="setSpinMode('surprise')" id="mode-surprise">&#x2728; Surprise Me</button>
    <button onclick="setSpinMode('fav')" id="mode-fav">&#x2764;&#xFE0F; Favorites</button>
  </div>
  <div class="spin-area">
    <button class="spin-button" id="spin-btn" onclick="spinRoulette()">SPIN!</button>
  </div>
  <div class="roulette-display" id="roulette-display"></div>
  <div id="spin-actions" style="display:none;">
    <button class="btn btn-mint" onclick="openCalendarPicker()">Add to Week</button>
    <button class="btn btn-lavender" onclick="logToHistory()">I ate this tonight!</button>
  </div>
</div>

<div id="page-calendar" class="page">
  <h2 style="font-size: 20px; font-weight: 900; margin-bottom: 14px;">This Week's Dinners</h2>
  <div id="calendar-grid"></div>
  <button class="btn btn-lavender" onclick="autoFillWeek()">&#x2728; Auto-fill My Week</button>
  <button class="btn btn-peach" onclick="clearWeek()">Clear Week</button>

  <div style="margin-top: 30px;">
    <h2 style="font-size: 20px; font-weight: 900; margin-bottom: 14px;">Meal History</h2>
    <div id="history-list"></div>
  </div>
</div>

<div id="page-grocery" class="page">
  <h2 style="font-size: 20px; font-weight: 900; margin-bottom: 6px;">Grocery List</h2>
  <p style="color: var(--text-light); font-size: 14px; margin-bottom: 14px;">
    Based on meals in your week. Amounts for <span id="people-count">4</span> people.
  </p>
  <button class="btn btn-lavender" onclick="generateGroceryList()">Make Grocery List</button>
  <div id="grocery-list" style="margin-top: 18px;"></div>
</div>

<div id="page-settings" class="page">
  <h2 style="font-size: 20px; font-weight: 900; margin-bottom: 14px;">Settings</h2>
  <div class="setting-row">
    <label>How many people?</label>
    <input type="number" id="family-size-input" min="1" max="20" onchange="setFamilySize()">
  </div>
  <div class="setting-row">
    <label>Sound effects</label>
    <div class="toggle-switch" id="sound-toggle" onclick="toggleSound()"></div>
  </div>
  <div class="setting-row">
    <label>Dark mode</label>
    <div class="toggle-switch" id="dark-toggle" onclick="toggleTheme()"></div>
  </div>
  <div class="setting-row" style="display:block;">
    <label style="margin-bottom: 10px;">Clear all data</label>
    <button class="btn btn-peach btn-small" onclick="clearAllData()">Reset Everything</button>
  </div>
</div>

<div class="celebration-overlay" id="celebration">
  <div class="winner-emoji" id="winner-emoji">&#x1F37D;&#xFE0F;</div>
  <div class="winner-text" id="winner-text"></div>
  <div class="winner-sub">Tonight's dinner!</div>
  <div class="six-seven-hands">&#x1F64C; &#x1F64C;</div>
  <button class="close-celebration" onclick="closeCelebration()">Let's go!</button>
</div>

<div class="modal-overlay" id="day-modal">

  function guessEmoji(name) {
    const n = name.toLowerCase();
    if (recipeDatabase[n]) return recipeDatabase[n].emoji;
    for (const key of Object.keys(recipeDatabase)) {
      if (n.includes(key) || key.includes(n)) return recipeDatabase[key].emoji;
    }
    if (n.includes('pasta') || n.includes('spaghetti') || n.includes('noodle')) return '\u{1F35D}';
    if (n.includes('pizza')) return '\u{1F355}';
    if (n.includes('burger')) return '\u{1F354}';
    if (n.includes('chicken')) return '\u{1F357}';
    if (n.includes('fish')) return '\u{1F41F}';
    if (n.includes('salad')) return '\u{1F957}';
    if (n.includes('soup')) return '\u{1F372}';
    if (n.includes('rice')) return '\u{1F35A}';
    if (n.includes('sandwich') || n.includes('wrap')) return '\u{1F96A}';
    if (n.includes('curry')) return '\u{1F35B}';
    if (n.includes('taco') || n.includes('burrito')) return '\u{1F32E}';
    if (n.includes('cheese')) return '\u{1F9C0}';
    if (n.includes('egg')) return '\u{1F373}';
    if (n.includes('steak') || n.includes('beef')) return '\u{1F969}';
    return '\u{1F37D}\uFE0F';
  }

  // Stop words that shouldn't match anything
  const stopWords = new Set(['and', 'with', 'the', 'a', 'of', 'in', 'on', 'for', 'to', 'my', 'our', 'some', 'homemade', 'easy', 'quick']);

  let activeRecipeMatch = null; // which recipe key we're currently suggesting from

  function suggestIngredients() {
    const name = document.getElementById('recipe-name').value.toLowerCase().trim();
    const sugArea = document.getElementById('suggestions-area');
    const chips = document.getElementById('suggested-chips');
    const matchBar = document.getElementById('match-bar');

    if (name.length < 3) {
      sugArea.style.display = 'none';
      if (matchBar) matchBar.style.display = 'none';
      activeRecipeMatch = null;
      return;
    }

    const nameWords = name.split(/\s+/).filter(w => w.length >= 3 && !stopWords.has(w));
    if (nameWords.length === 0) {
      sugArea.style.display = 'none';
      if (matchBar) matchBar.style.display = 'none';
      activeRecipeMatch = null;
      return;
    }

    // Score every recipe
    const scored = [];
    for (const [key, data] of Object.entries(recipeDatabase)) {
      const keyWords = key.split(' ').filter(w => w.length >= 3);
      let score = 0;
      for (const nw of nameWords) {
        for (const kw of keyWords) {
          if (kw === nw) score += 10;
          else if (kw.length >= 4 && nw.length >= 4 && (kw.startsWith(nw) || nw.startsWith(kw))) score += 3;
        }
      }
      if (key === name) score += 100;
      else if (key.split(' ').every(w => nameWords.includes(w))) score += 5;

      if (score >= 10) scored.push({ key, data, score });
    }

    // Sort best first
    scored.sort((a, b) => b.score - a.score);

    if (scored.length === 0) {
      sugArea.style.display = 'none';
      if (matchBar) matchBar.style.display = 'none';
      activeRecipeMatch = null;
      return;
    }

    // If we haven't locked onto a match yet, pick the top one
    if (!activeRecipeMatch || !scored.some(s => s.key === activeRecipeMatch)) {
      activeRecipeMatch = scored[0].key;
    }
    const active = scored.find(s => s.key === activeRecipeMatch) || scored[0];

    // Build match bar - let user pick between the top matches
    if (matchBar) {
      if (scored.length > 1) {
        matchBar.style.display = 'flex';
        matchBar.innerHTML = '';
        const top = scored.slice(0, 5); // show top 5
        for (const s of top) {
          const chip = document.createElement('div');
          chip.className = 'chip' + (s.key === activeRecipeMatch ? ' selected' : '');
          chip.textContent = (s.data.emoji || '') + ' ' + s.key;
          chip.onclick = () => { activeRecipeMatch = s.key; suggestIngredients(); };
          matchBar.appendChild(chip);
        }
      } else {
        matchBar.style.display = 'none';
      }
    }

    // Show ingredients for active match
    sugArea.style.display = 'block';
    chips.innerHTML = '';
    const label = document.querySelector('#suggestions-area label');
    if (label) label.textContent = `Suggested for "${active.key}" (tap to select)`;
    for (const ing of Object.keys(active.data.ingredients)) {
      const chip = document.createElement('div');
      const sel = currentIngredients.find(i => i.name === ing);
      chip.className = 'chip' + (sel ? ' selected' : '');
      chip.textContent = ing;
      chip.onclick = () => toggleIngredient(ing, active.data.ingredients[ing]);
      chips.appendChild(chip);
    }
  }

  function toggleIngredient(name, qty) {
    const idx = currentIngredients.findIndex(i => i.name === name);
    if (idx >= 0) {
      currentIngredients.splice(idx, 1);
    } else {
      currentIngredients.push({ name, amount: qty ? qty[0] : 1, unit: qty ? qty[1] : '' });
    }
    suggestIngredients();
    renderSelectedIngredients();
  }

  function addCustomIngredient() {
    const input = document.getElementById('custom-ingredient');
    const val = input.value.trim().toLowerCase();
    if (!val || currentIngredients.some(i => i.name === val)) return;
    currentIngredients.push({ name: val, amount: 1, unit: '' });
    input.value = '';
    suggestIngredients();
    renderSelectedIngredients();
  }

  function renderSelectedIngredients() {
    const container = document.getElementById('selected-ingredients');
    container.innerHTML = '';
    for (const ing of currentIngredients) {
      const chip = document.createElement('div');
      chip.className = 'chip selected';

  function getSpinPool() {
    if (spinMode === 'fav') return recipes.filter(r => r.favorite);
    if (spinMode === 'surprise') {
      const weekAgo = Date.now() - 7 * 24 * 60 * 60 * 1000;
      const recentIds = new Set(history.filter(h => h.date > weekAgo).map(h => h.recipeId));
      const pool = recipes.filter(r => !recentIds.has(r.id));
      return pool.length > 0 ? pool : recipes;
    }
    return recipes;

  function spinRoulette() {
    if (spinning) return;
    const pool = getSpinPool();
    if (pool.length < 2) {
      alert(spinMode === 'fav' ? 'Need at least 2 favorite recipes!' :
            spinMode === 'surprise' ? 'Need at least 2 recipes you haven\'t had recently!' :
            'Add at least 2 recipes first!');
      return;
    }

    spinning = true;
    const btn = document.getElementById('spin-btn');
    const display = document.getElementById('roulette-display');
    const actions = document.getElementById('spin-actions');
    btn.classList.add('spinning');
    actions.style.display = 'none';
    playSound('spin');

    let count = 0;
    const total = 20 + Math.floor(Math.random() * 10);
    let delay = 80;

    function flip() {
      const r = pool[Math.floor(Math.random() * pool.length)];
      display.innerHTML = `<div class="roulette-card shuffling"><span>${r.emoji || '\u{1F37D}\uFE0F'}</span><span>${escHtml(r.name)}</span></div>`;
      count++;
      if (count < total) {
        delay += count * 3;
        setTimeout(flip, delay);
      } else {
        const winner = pool[Math.floor(Math.random() * pool.length)];
        lastWinner = winner;
        display.innerHTML = `<div class="roulette-card"><span>${winner.emoji || '\u{1F37D}\uFE0F'}</span><span>${escHtml(winner.name)}</span></div>`;
        btn.classList.remove('spinning');
        spinning = false;
        actions.style.display = 'block';
        setTimeout(() => showCelebration(winner), 300);
      }
    }
    flip();
  }

  // Normalize ingredient name -> canonical form
  function normalizeIngredient(rawName) {
    if (!rawName) return '';
    let n = rawName.toLowerCase().trim();
    // Strip simple plurals/extras
    n = n.replace(/\s+/g, ' ');
    if (ingredientAliases[n]) return ingredientAliases[n];
    // Try stripping trailing 's' for naive plurals
    if (n.endsWith('s') && ingredientAliases[n.slice(0, -1)]) return ingredientAliases[n.slice(0, -1)];
    // Try stripping 'es' (tomatoes -> tomato)
    if (n.endsWith('es') && ingredientAliases[n.slice(0, -2)]) return ingredientAliases[n.slice(0, -2)];
    // Substring match (e.g. "crushed tomatoes" -> tomato)
    for (const [alias, canon] of Object.entries(ingredientAliases)) {
      if (n.includes(alias)) return canon;
    }
    return n;
  }

  // ============ SMART UNIT CONVERSIONS ============
  // Convert every unit to a "base unit" so we can add them up.
  // Returns [amountInBase, baseUnit] or null if we can't convert.
  function toBase(amount, unit) {
    const u = (unit || '').toLowerCase().trim();
    // Weight -> grams
    if (u === 'g' || u === 'gram' || u === 'grams') return [amount, 'g'];
    if (u === 'kg' || u === 'kilo' || u === 'kilos' || u === 'kilogram' || u === 'kilograms') return [amount * 1000, 'g'];
    // Volume -> ml
    if (u === 'ml' || u === 'milliliter' || u === 'millilitre') return [amount, 'ml'];
    if (u === 'l' || u === 'liter' || u === 'litre' || u === 'liters' || u === 'litres') return [amount * 1000, 'ml'];
    // Spoons -> ml (approx)
    if (u === 'tsp' || u === 'teaspoon' || u === 'teaspoons') return [amount * 5, 'ml-spoon'];
    if (u === 'tbsp' || u === 'tablespoon' || u === 'tablespoons') return [amount * 15, 'ml-spoon'];
    // Counted items keep their unit
    return null;
  }

  // Convert from base back to the "best" display unit
  function fromBase(amount, baseUnit) {
    if (baseUnit === 'g') {
      if (amount >= 1000) return [+(amount / 1000).toFixed(2), 'kg'];
      return [Math.round(amount), 'g'];
    }
    if (baseUnit === 'ml') {
      if (amount >= 1000) return [+(amount / 1000).toFixed(2), 'L'];
      return [Math.round(amount), 'ml'];
    }
    if (baseUnit === 'ml-spoon') {
      // Convert back to tbsp/tsp nicely
      if (amount >= 45) { // 3+ tbsp -> use tbsp
        const tbsp = amount / 15;
        return [Math.round(tbsp * 2) / 2, 'tbsp'];
      }
      if (amount >= 15) {
        return [Math.round((amount / 15) * 2) / 2, 'tbsp'];
      }
      return [Math.round((amount / 5) * 2) / 2, 'tsp'];
    }
    return [amount, baseUnit];
  }

  function generateGroceryList() {
    const mealIds = Object.values(week).filter(x => x);
    if (mealIds.length === 0) {
      document.getElementById('grocery-list').innerHTML = '<div class="empty-state"><div class="emoji">\u{1F6D2}</div><p>Add some meals to your week first!</p></div>';
      return;
    }

    // combined[canonicalName] = { name, buckets: { baseUnit: amount, ... }, countedUnits: { unit: amount } }
    const combined = {};
    for (const id of mealIds) {
      const recipe = recipes.find(r => r.id === id);
      if (!recipe) continue;
      for (const ing of recipe.ingredients) {
        const rawName = typeof ing === 'string' ? ing : ing.name;
        const amount = typeof ing === 'string' ? null : ing.amount;
        const unit = typeof ing === 'string' ? '' : ing.unit;
        const canonName = normalizeIngredient(rawName);

        if (!combined[canonName]) {
          combined[canonName] = { name: canonName, buckets: {}, countedUnits: {}, hasAmount: false };
        }
        const entry = combined[canonName];

        if (amount == null) continue;
        const scaledAmount = amount * settings.familySize;
        entry.hasAmount = true;

        const base = toBase(scaledAmount, unit);
        if (base) {
          // Mergeable unit (g, ml, spoons)
          const [amt, bUnit] = base;
          entry.buckets[bUnit] = (entry.buckets[bUnit] || 0) + amt;
        } else {
          // Counted (e.g. "2 slices", "3 cloves") - add by unit
          const u = unit || 'whole';
          entry.countedUnits[u] = (entry.countedUnits[u] || 0) + scaledAmount;
        }
      }
    }

    // Sort names alphabetically
    const sorted = Object.keys(combined).sort();
    groceryChecked = groceryChecked.filter(g => sorted.includes(g));
    save();

    const list = document.getElementById('grocery-list');
    list.innerHTML = '';
    document.getElementById('people-count').textContent = settings.familySize;

    if (sorted.length === 0) {
      list.innerHTML = '<div class="empty-state"><div class="emoji">\u{1F6D2}</div><p>Add some meals to your week first!</p></div>';
      return;
    }

    for (const key of sorted) {
      const item = combined[key];
      const div = document.createElement('div');
      div.className = 'grocery-item' + (groceryChecked.includes(key) ? ' checked' : '');

      // Build amount string from buckets + countedUnits
      const parts = [];
      for (const [baseUnit, amt] of Object.entries(item.buckets)) {
        const [displayAmt, displayUnit] = fromBase(amt, baseUnit);
        parts.push(displayAmt + (displayUnit ? ' ' + displayUnit : ''));
      }
      for (const [u, amt] of Object.entries(item.countedUnits)) {
        const prettyAmt = Math.ceil(amt * 2) / 2;
        parts.push(prettyAmt + (u && u !== 'whole' ? ' ' + u : ''));
      }
      const amountStr = item.hasAmount ? parts.join(' + ') : '';

      div.innerHTML = `
        <div class="grocery-check">${groceryChecked.includes(key) ? '\u2713' : ''}</div>
        <span>${escHtml(item.name)}</span>
        ${amountStr ? `<span class="grocery-amount">${amountStr}</span>` : ''}
      `;
      div.onclick = () => {
        const idx = groceryChecked.indexOf(key);
        if (idx >= 0) groceryChecked.splice(idx, 1);
        else groceryChecked.push(key);
        save();
        generateGroceryList();
      };
      list.appendChild(div);
    }
  }

  function formatAmount(amount, unit) {
    if (unit === 'g' || unit === 'ml') {
      if (amount >= 1000) {
        const bigUnit = unit === 'g' ? 'kg' : 'L';
        return (amount / 1000).toFixed(1).replace('.0', '') + ' ' + bigUnit;
      }
      return Math.round(amount) + ' ' + unit;
    }
    return Math.ceil(amount * 2) / 2 + (unit ? ' ' + unit : '');
  }

  function setFamilySize() {
    const val = parseInt(document.getElementById('family-size-input').value) || 1;
    settings.familySize = Math.max(1, Math.min(20, val));
    save();
    mascotSay(`Cooking for ${settings.familySize}!`);
  }

  function toggleSound() {
    settings.sound = !settings.sound;
    save();
    updateSettingsUI();
    if (settings.sound) playSound('tap');
  }

  function toggleTheme() {
    settings.theme = settings.theme === 'dark' ? 'light' : 'dark';
    applyTheme();
    save();
    updateSettingsUI();
  }

  function applyTheme() {
    document.body.setAttribute('data-theme', settings.theme);
    document.getElementById('theme-btn').textContent = settings.theme === 'dark' ? '\u2600\uFE0F' : '\u{1F319}';
  }

  function updateSettingsUI() {
    document.getElementById('family-size-input').value = settings.familySize;
    document.getElementById('sound-toggle').classList.toggle('on', settings.sound);
    document.getElementById('dark-toggle').classList.toggle('on', settings.theme === 'dark');
  }

  function clearAllData() {
    if (!confirm('This will delete ALL your recipes, history, and settings. Are you sure?')) return;
    if (!confirm('Really sure? This cannot be undone!')) return;
    localStorage.clear();
    location.reload();
  }

  let audioCtx = null;
  function playSound(type) {
    if (!settings.sound) return;
    try {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const now = audioCtx.currentTime;
      const freqs = {
        tap: [[800, 0.08]],
        add: [[523, 0.1], [659, 0.1], [784, 0.12]],
        spin: [[200, 0.05], [300, 0.05], [400, 0.05], [500, 0.05], [600, 0.05]],
        win: [[523, 0.15], [659, 0.15], [784, 0.15], [1047, 0.3]],
      };
      const seq = freqs[type] || freqs.tap;
      let t = now;
      for (const [freq, dur] of seq) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.frequency.value = freq;
        osc.type = 'sine';
        gain.gain.setValueAtTime(0.15, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(t);
        osc.stop(t + dur);
        t += dur;
      }
    } catch (e) {}
  }

  const mascotMessages = ["What's cooking?", "Hungry?", "Let's eat!", "Roll the dice!", "Spin it!", "Yummy yum!"];
  function mascotSay(msg) {
    const el = document.getElementById('mascot-speech');
    el.textContent = msg;
    setTimeout(() => {
      el.textContent = mascotMessages[Math.floor(Math.random() * mascotMessages.length)];
    }, 3000);
  }

  function showPage(name) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page-' + name).classList.add('active');
    const btns = document.querySelectorAll('.nav button');
    const pages = ['recipes', 'spin', 'calendar', 'grocery', 'settings'];
    btns.forEach((b, i) => b.classList.toggle('active', pages[i] === name));
    if (name === 'calendar') renderCalendar();
    if (name === 'grocery') generateGroceryList();
    if (name === 'settings') updateSettingsUI();
    playSound('tap');
  }

  function escHtml(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  document.getElementById('recipe-name').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('custom-ingredient').focus();
  });
  document.getElementById('custom-ingredient').addEventListener('keydown', e => {
    if (e.key === 'Enter') addCustomIngredient();
  });

  // Migrate old recipes (string ingredients) to new format
  for (const r of recipes) {
    if (!r.emoji) r.emoji = guessEmoji(r.name);
    if (r.rating === undefined) r.rating = 0;
    if (r.favorite === undefined) r.favorite = false;
    r.ingredients = r.ingredients.map(ing => typeof ing === 'string' ? { name: ing, amount: 1, unit: '' } : ing);
  }
  save();

  applyTheme();
  updateSettingsUI();
  setFilter('all');
  renderRecipes();
</script>
</body>
</html>
