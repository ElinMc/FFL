<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dinner Roulette</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --pink: #FFB5C2;
    --mint: #B8E8D0;
    --lavender: #C5B9F2;
    --peach: #FFDAB3;
    --blue: #B3D9FF;
    --yellow: #FFF2B3;
    --bg: #FFF5F7;
    --card-bg: #FFFFFF;
    --text: #5A4E6B;
    --text-light: #8B7FA3;
    --border: #f0e0e8;
  }

  [data-theme="dark"] {
    --pink: #E89AB0;
    --mint: #8FC9B0;
    --lavender: #A89AD6;
    --peach: #E8B888;
    --blue: #8FB8E0;
    --yellow: #E8D888;
    --bg: #2B2438;
    --card-bg: #3D3450;
    --text: #F5EDF7;
    --text-light: #C5B9D0;
    --border: #4A3F5E;
  }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 100px;
    transition: background 0.3s, color 0.3s;
  }

  .nav {
    display: flex;
    justify-content: center;
    gap: 6px;
    padding: 14px 10px;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
    border-bottom: 2px solid var(--border);
    flex-wrap: wrap;
  }
  .nav button {
    background: var(--card-bg);
    border: 2px solid var(--border);
    border-radius: 20px;
    padding: 9px 16px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    cursor: pointer;
    transition: all 0.2s;
  }
  .nav button.active {
    background: var(--pink);
    border-color: var(--pink);
    color: white;
  }
  .nav button:hover { transform: scale(1.05); }

  .theme-toggle {
    position: fixed;
    top: 14px;
    right: 14px;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: var(--card-bg);
    cursor: pointer;
    font-size: 18px;
    z-index: 200;
  }

  .header {
    text-align: center;
    padding: 26px 20px 6px;
  }
  /* ========== MASCOT: Spinny the Chef ========== */
  .mascot-wrap {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    user-select: none;
  }
  .mascot {
    width: 80px;
    height: 80px;
    display: inline-block;
    animation: mascot-bob 2.8s ease-in-out infinite;
    transform-origin: center bottom;
    filter: drop-shadow(0 4px 8px rgba(255, 181, 194, 0.35));
  }
  @keyframes mascot-bob {
    0%, 100% { transform: translateY(0) rotate(-2deg); }
    50% { transform: translateY(-6px) rotate(2deg); }
  }
  .mascot.excited { animation: mascot-excited 0.35s ease-in-out infinite; }
  @keyframes mascot-excited {
    0%, 100% { transform: translateY(-4px) rotate(-8deg) scale(1.08); }
    50% { transform: translateY(-14px) rotate(8deg) scale(1.12); }
  }
  .mascot.thinking { animation: mascot-bob 1.4s ease-in-out infinite; }
  .mascot.sleepy { animation: mascot-sleepy 4s ease-in-out infinite; }
  @keyframes mascot-sleepy {
    0%, 100% { transform: translateY(0) rotate(-1deg); }
    50% { transform: translateY(-2px) rotate(1deg); }
  }

  /* Blinking eyes */
  .mascot .eye-lid {
    animation: blink 4s infinite;
    transform-origin: center;
  }
  @keyframes blink {
    0%, 48%, 52%, 98%, 100% { transform: scaleY(0); }
    50% { transform: scaleY(1); }
  }
  .mascot.sleepy .eye-lid { animation: blink-slow 2.5s infinite; }
  @keyframes blink-slow {
    0%, 100% { transform: scaleY(0.7); }
    50% { transform: scaleY(0.9); }
  }

  /* Chef hat wobble */
  .mascot .hat {
    transform-origin: 50px 40px;
    animation: hat-wobble 3s ease-in-out infinite;
  }
  @keyframes hat-wobble {
    0%, 100% { transform: rotate(-3deg); }
    50% { transform: rotate(3deg); }
  }

  /* Star sparkles when excited */
  .mascot .sparkle {
    opacity: 0;
    transform-origin: center;
  }
  .mascot.excited .sparkle {
    animation: sparkle-pop 0.6s ease-in-out infinite;
  }
  .mascot.excited .sparkle:nth-child(2) { animation-delay: 0.2s; }
  .mascot.excited .sparkle:nth-child(3) { animation-delay: 0.4s; }
  @keyframes sparkle-pop {
    0%, 100% { opacity: 0; transform: scale(0.3); }
    50% { opacity: 1; transform: scale(1.2); }
  }

  /* Thinking dots */
  .mascot .thought-dot { opacity: 0; }
  .mascot.thinking .thought-dot { animation: thought 1.2s ease-in-out infinite; }
  .mascot.thinking .thought-dot:nth-child(2) { animation-delay: 0.2s; }
  .mascot.thinking .thought-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes thought {
    0%, 100% { opacity: 0; transform: translateY(4px); }
    50% { opacity: 1; transform: translateY(0); }
  }

  /* Zzz when sleepy */
  .mascot .zzz { opacity: 0; }
  .mascot.sleepy .zzz { animation: zzz-fade 3s ease-in-out infinite; }
  @keyframes zzz-fade {
    0%, 100% { opacity: 0; transform: translate(0, 0); }
    50% { opacity: 1; transform: translate(6px, -8px); }
  }

  /* Mouth swap */
  .mascot .mouth-happy,
  .mascot .mouth-wow,
  .mascot .mouth-smile { display: none; }
  .mascot[data-mood="idle"] .mouth-smile { display: block; }
  .mascot[data-mood="happy"] .mouth-happy { display: block; }
  .mascot[data-mood="excited"] .mouth-wow { display: block; }
  .mascot[data-mood="thinking"] .mouth-smile { display: block; }
  .mascot[data-mood="sleepy"] .mouth-smile { display: block; }

  .mascot-speech {
    background: var(--card-bg);
    border: 2px solid var(--border);
    border-radius: 20px;
    padding: 10px 18px;
    display: inline-block;
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    position: relative;
    vertical-align: middle;
    max-width: 200px;
    animation: speech-pop 0.3s ease-out;
  }
  @keyframes speech-pop {
    from { transform: scale(0.8); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .mascot-speech::before {
    content: '';
    position: absolute;
    left: -10px;
    top: 50%;
    transform: translateY(-50%);
    border: 7px solid transparent;
    border-right-color: var(--border);
  }
  .mascot-speech::after {
    content: '';
    position: absolute;
    left: -7px;
    top: 50%;
    transform: translateY(-50%);
    border: 6px solid transparent;
    border-right-color: var(--card-bg);
  }
  .header h1 {
    font-size: 32px;
    font-weight: 900;
    margin-top: 6px;
    background: linear-gradient(135deg, var(--pink), var(--lavender), var(--blue));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .page { display: none; padding: 20px; max-width: 560px; margin: 0 auto; }
  .page.active { display: block; }

  .recipe-card {
    background: var(--card-bg);
    border-radius: 20px;
    padding: 18px;
    margin-bottom: 14px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    border: 2px solid transparent;
    transition: all 0.2s;
  }
  .recipe-card:hover { border-color: var(--pink); }
  .recipe-card-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }
  .recipe-emoji { font-size: 32px; flex-shrink: 0; }
  .recipe-card h3 { font-size: 18px; font-weight: 800; flex: 1; }
  .recipe-card .ingredients {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 8px;
  }
  .recipe-card .ingredient-tag {
    background: var(--bg);
    padding: 4px 12px;
    border-radius: 12px;
    font-size: 13px;
    color: var(--text-light);
  }
  .cat-tag {
    background: linear-gradient(135deg, var(--pink), var(--lavender));
    color: white;
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 700;
    margin-left: auto;
    white-space: nowrap;
  }
  .cat-picker {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 6px;
  }
  .cat-pick-chip {
    cursor: pointer;
    user-select: none;
    display: inline-block;
  }
  .cat-pick-chip input { display: none; }
  .cat-pick-chip span {
    display: inline-block;
    padding: 8px 14px;
    border-radius: 16px;
    background: var(--card-bg);
    border: 2px solid #f0e0e8;
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
    transition: all 0.15s;
  }
  .cat-pick-chip input:checked + span {
    background: var(--lavender);
    border-color: var(--lavender);
    color: white;
  }
  .card-actions {
    display: flex;
    gap: 6px;
    align-items: center;
    margin-top: 12px;
    flex-wrap: wrap;
  }
  .star-rating { display: flex; gap: 2px; }
  .star {
    cursor: pointer;
    font-size: 20px;
    color: #ddd;
    transition: transform 0.1s;
    user-select: none;
  }
  .star:hover { transform: scale(1.2); }
  .star.filled { color: #FFC940; }
  .fav-btn {
    background: none;
    border: none;
    font-size: 22px;
    cursor: pointer;
    padding: 4px;
    transition: transform 0.1s;
  }
  .fav-btn:hover { transform: scale(1.2); }
  .delete-btn {
    margin-left: auto;
    background: none;
    border: none;
    font-size: 18px;
    cursor: pointer;
    opacity: 0.4;
    color: var(--text);
  }
  .delete-btn:hover { opacity: 1; }

  .card-color-0 { border-left: 4px solid var(--pink); }
  .card-color-1 { border-left: 4px solid var(--mint); }
  .card-color-2 { border-left: 4px solid var(--lavender); }
  .card-color-3 { border-left: 4px solid var(--peach); }
  .card-color-4 { border-left: 4px solid var(--blue); }

  .form-group { margin-bottom: 16px; }
  .form-group label {
    font-weight: 700;
    font-size: 14px;
    display: block;
    margin-bottom: 6px;
  }
  input[type="text"], input[type="number"] {
    width: 100%;
    padding: 14px 18px;
    border: 2px solid var(--border);
    border-radius: 16px;
    font-family: inherit;
    font-size: 16px;
    background: var(--card-bg);
    color: var(--text);
    outline: none;
  }
  input[type="text"]:focus, input[type="number"]:focus { border-color: var(--lavender); }

  .suggested-ingredients {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 10px;
  }
  .chip {
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    border: 2px solid var(--border);
    background: var(--card-bg);
    color: var(--text);
    user-select: none;
  }
  .chip.selected {
    background: var(--mint);
    border-color: var(--mint);
    color: white;
  }
  .chip:hover { transform: scale(1.05); }

  .add-custom-ingredient {
    display: flex;
    gap: 8px;
    margin-top: 10px;
  }
  .add-custom-ingredient input { flex: 1; }
  .add-custom-ingredient button {
    padding: 10px 18px;
    border-radius: 16px;
    border: none;
    background: var(--lavender);
    color: white;
    font-family: inherit;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
  }

  .btn {
    display: block;
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 20px;
    font-family: inherit;
    font-size: 17px;
    font-weight: 800;
    cursor: pointer;
    margin-top: 12px;
  }
  .btn:hover { transform: scale(1.02); }
  .btn-pink { background: var(--pink); color: white; }
  .btn-mint { background: var(--mint); color: white; }
  .btn-lavender { background: var(--lavender); color: white; }
  .btn-peach { background: var(--peach); color: white; }
  .btn-small {
    display: inline-block;
    width: auto;
    padding: 10px 20px;
    font-size: 14px;
    margin-top: 0;
  }

  .spin-mode-toggle {
    display: flex;
    gap: 6px;
    margin-bottom: 20px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .spin-mode-toggle button {
    padding: 8px 16px;
    border-radius: 16px;
    border: 2px solid var(--border);
    background: var(--card-bg);
    color: var(--text);
    font-family: inherit;
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
  }
  .spin-mode-toggle button.active {
    background: var(--lavender);
    border-color: var(--lavender);
    color: white;
  }
  .spin-area { text-align: center; padding: 10px 0 20px; }
  .spin-button {
    width: 200px;
    height: 200px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--pink), var(--lavender));
    border: none;
    font-family: inherit;
    font-size: 28px;
    font-weight: 900;
    color: white;
    cursor: pointer;
    box-shadow: 0 8px 30px rgba(197,185,242,0.4);
  }
  .spin-button:hover { transform: scale(1.08); }
  .spin-button:active { transform: scale(0.95); }
  .spin-button.spinning { animation: pulse 0.3s ease-in-out infinite; }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }

  .roulette-display {
    margin: 30px 0;
    min-height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .roulette-card {
    background: var(--card-bg);
    border-radius: 24px;
    padding: 20px 30px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    font-size: 22px;
    font-weight: 800;
    text-align: center;
    border: 3px solid var(--pink);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .roulette-card.shuffling {
    animation: shuffle 0.15s ease-in-out;
  }
  @keyframes shuffle {
    0% { transform: translateY(-20px) scale(0.9); opacity: 0.3; }
    100% { transform: translateY(0) scale(1); opacity: 1; }
  }

  .celebration-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 1000;
    background: var(--bg);
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .celebration-overlay.active { display: flex; }
  .winner-emoji {
    font-size: 80px;
    animation: winnerBounce 0.4s ease-in-out infinite alternate;
  }
  @keyframes winnerBounce {
    0% { transform: translateY(0) scale(1) rotate(-5deg); }
    100% { transform: translateY(-20px) scale(1.15) rotate(5deg); }
  }
  .winner-text {
    font-size: 42px;
    font-weight: 900;
    text-align: center;
    margin-top: 10px;
    animation: sixSeven 0.4s ease-in-out infinite alternate;
    background: linear-gradient(135deg, var(--pink), var(--lavender));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .winner-sub {
    font-size: 18px;
    color: var(--text-light);
    margin-top: 10px;
  }
  @keyframes sixSeven {
    0% { transform: translateY(0) scale(1); }
    100% { transform: translateY(-10px) scale(1.08); }
  }
  .six-seven-hands {
    font-size: 50px;
    animation: handsUp 0.3s ease-in-out infinite alternate;
    margin-top: 16px;
  }
  @keyframes handsUp {
    0% { transform: translateY(0) rotate(-10deg); }
    100% { transform: translateY(-15px) rotate(10deg); }
  }
  .close-celebration {
    margin-top: 30px;
    padding: 14px 40px;
    border-radius: 20px;
    border: none;
    background: var(--pink);
    color: white;
    font-family: inherit;
    font-size: 18px;
    font-weight: 800;
    cursor: pointer;
  }

  .confetti-piece {
    position: fixed;
    width: 10px;
    height: 10px;
    border-radius: 3px;
    z-index: 1001;
    pointer-events: none;
  }
  @keyframes confettiFall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }

  .grocery-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    background: var(--card-bg);
    border-radius: 14px;
    margin-bottom: 8px;
    font-size: 16px;
    cursor: pointer;
    user-select: none;
  }
  .grocery-item.checked {
    text-decoration: line-through;
    opacity: 0.5;
  }
  .grocery-check {
    width: 24px;
    height: 24px;
    border-radius: 8px;
    border: 2px solid var(--pink);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 14px;
  }
  .grocery-item.checked .grocery-check {
    background: var(--pink);
    color: white;
  }
  .grocery-amount {
    margin-left: auto;
    font-weight: 700;
    color: var(--text-light);
    font-size: 14px;
  }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-light);
  }
  .empty-state .emoji { font-size: 48px; margin-bottom: 12px; }

  .calendar-day {
    background: var(--card-bg);
    border-radius: 16px;
    padding: 14px 16px;
    border-left: 4px solid var(--lavender);
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    margin-bottom: 10px;
  }
  .calendar-day:hover { transform: translateX(3px); }
  .calendar-day-name {
    font-weight: 800;
    font-size: 14px;
    width: 70px;
    color: var(--text-light);
    flex-shrink: 0;
  }
  .calendar-day-meal {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .calendar-day-empty {
    color: var(--text-light);
    font-style: italic;
    font-size: 14px;
  }
  .calendar-day-emoji { font-size: 22px; }
  .calendar-clear {
    background: none;
    border: none;
    font-size: 16px;
    opacity: 0.4;
    cursor: pointer;
    color: var(--text);
  }

  .history-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    background: var(--card-bg);
    border-radius: 14px;
    margin-bottom: 8px;
  }
  .history-date {
    color: var(--text-light);
    font-size: 12px;
    margin-left: auto;
  }

  .setting-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    background: var(--card-bg);
    border-radius: 16px;
    margin-bottom: 10px;
    gap: 12px;
  }
  .setting-row label {
    font-weight: 700;
    font-size: 15px;
    flex: 1;
  }
  .setting-row input[type="number"] {
    width: 80px;
    text-align: center;
    padding: 10px;
  }
  .toggle-switch {
    width: 50px;
    height: 28px;
    background: var(--border);
    border-radius: 14px;
    position: relative;
    cursor: pointer;
    flex-shrink: 0;
  }
  .toggle-switch.on { background: var(--mint); }
  .toggle-switch::after {
    content: '';
    width: 22px;
    height: 22px;
    background: white;
    border-radius: 50%;
    position: absolute;
    top: 3px;
    left: 3px;
    transition: left 0.2s;
  }
  .toggle-switch.on::after { left: 25px; }

  .modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.4);
    z-index: 500;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: var(--card-bg);
    border-radius: 20px;
    padding: 20px;
    max-width: 400px;
    width: 100%;
    max-height: 80vh;
    overflow-y: auto;
  }
  .modal h3 {
    font-size: 20px;
    font-weight: 800;
    margin-bottom: 14px;
  }
  .modal-recipe-btn {
    display: block;
    padding: 12px 14px;
    background: var(--bg);
    border-radius: 12px;
    margin-bottom: 6px;
    cursor: pointer;
    border: none;
    width: 100%;
    font-family: inherit;
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    text-align: left;
  }
  .modal-recipe-btn:hover { background: var(--pink); color: white; }

  @media (max-width: 400px) {
    .header h1 { font-size: 26px; }
    .spin-button { width: 170px; height: 170px; font-size: 24px; }
    .winner-text { font-size: 32px; }
    .winner-emoji { font-size: 60px; }
  }
</style>
</head>
<body>

<button class="theme-toggle" onclick="toggleTheme()" id="theme-btn">&#x1F319;</button>

<nav class="nav">
  <button class="active" onclick="showPage('recipes')" data-i18n="nav_recipes">Recipes</button>
  <button onclick="showPage('spin')" data-i18n="nav_spin">Spin!</button>

  // ============ CATEGORIES ============
  const CATEGORIES = [
    { id: 'all', key: 'cat_all', emoji: '\u{1F37D}\uFE0F' },
    { id: 'breakfast', key: 'cat_breakfast', emoji: '\u{1F373}' },
    { id: 'lunch', key: 'cat_lunch', emoji: '\u{1F96A}' },
    { id: 'dinner', key: 'cat_dinner', emoji: '\u{1F35D}' },
    { id: 'snacks', key: 'cat_snacks', emoji: '\u{1F37F}' },
    { id: 'sweet', key: 'cat_sweet', emoji: '\u{1F370}' }
  ];
  // Helper: get translated label for a category
  function catLabel(c) { return t(c.key); }
  let activeCategory = 'all';

  // Auto-guess a category from recipe name + ingredients (best effort)
  function guessCategory(name, ingredients) {
    const n = (name || '').toLowerCase();
    const ingList = Object.keys(ingredients || {}).join(' ').toLowerCase();

    // Sweet: cakes, cookies, ice cream, desserts
    const sweetKws = ['cake', 'cookie', 'brownie', 'cupcake', 'muffin', 'pie', 'tart', 'cheesecake',
                      'ice cream', 'pudding', 'crumble', 'custard', 'mousse', 'fudge', 'candy',
                      'chocolate', 'fruit salad', 'banana bread', 'donut', 'doughnut', 'scone',
                      'waffle', 'crepe', 'pancake'];
    // Exception: apple/chicken pie = not sweet
    if (n.includes('chicken pie') || n.includes('cottage pie') || n.includes('shepherd')
        || n.includes('fish pie') || n.includes('meat pie')) {
      // savory pies
    } else {
      for (const kw of sweetKws) if (n.includes(kw)) return 'sweet';
    }

    // Breakfast
    const breakfastKws = ['breakfast', 'porridge', 'oatmeal', 'granola', 'cereal', 'bagel',
                          'smoothie', 'egg', 'omelette', 'benedict', 'french toast',
                          'avocado toast', 'full english'];
    for (const kw of breakfastKws) if (n.includes(kw)) return 'breakfast';

    // Snacks: small bites, dips, light things
    const snackKws = ['hummus', 'dip', 'chip', 'crisp', 'popcorn', 'snack', 'nachos',
                      'garlic bread', 'cheese on toast', 'beans on toast', 'bruschetta',
                      'pigs in blankets', 'wings', 'spring roll'];
    for (const kw of snackKws) if (n.includes(kw)) return 'snacks';

    // Lunch: sandwiches, wraps, salads, soups
    const lunchKws = ['sandwich', 'wrap', 'salad', 'soup', 'tuna melt', 'toastie',
                      'burrito', 'quesadilla', 'bagel', 'panini', 'sub '];
    for (const kw of lunchKws) if (n.includes(kw)) return 'lunch';

    // Default is dinner (pasta, curry, roasts, mains, etc.)
    return 'dinner';
  }

  function categoryLabel(id) {
    const c = CATEGORIES.find(c => c.id === id);
    return c ? c.emoji + ' ' + t(c.key) : '';
  }

  function guessEmoji(name) {
    const n = name.toLowerCase();
    if (recipeDatabase[n]) return recipeDatabase[n].emoji;
    for (const key of Object.keys(recipeDatabase)) {
      if (n.includes(key) || key.includes(n)) return recipeDatabase[key].emoji;
    }
    if (n.includes('pasta') || n.includes('spaghetti') || n.includes('noodle')) return '\u{1F35D}';
    if (n.includes('pizza')) return '\u{1F355}';
    if (n.includes('burger')) return '\u{1F354}';
    if (n.includes('chicken')) return '\u{1F357}';
    if (n.includes('fish')) return '\u{1F41F}';
    if (n.includes('salad')) return '\u{1F957}';
    if (n.includes('soup')) return '\u{1F372}';
    if (n.includes('rice')) return '\u{1F35A}';
    if (n.includes('sandwich') || n.includes('wrap')) return '\u{1F96A}';
    if (n.includes('curry')) return '\u{1F35B}';
    if (n.includes('taco') || n.includes('burrito')) return '\u{1F32E}';
    if (n.includes('cheese')) return '\u{1F9C0}';
    if (n.includes('egg')) return '\u{1F373}';
    if (n.includes('steak') || n.includes('beef')) return '\u{1F969}';
    return '\u{1F37D}\uFE0F';
  }

  // Stop words that shouldn't match anything
  const stopWords = new Set(['and', 'with', 'the', 'a', 'of', 'in', 'on', 'for', 'to', 'my', 'our', 'some', 'homemade', 'easy', 'quick']);

  let activeRecipeMatch = null; // which recipe key we're currently suggesting from
  let webResults = {};          // cached web search results by search term
  let lastWebSearch = '';       // last term we searched for

  // Convert a raw TheMealDB meal object into our internal format.
  function mealToRecipe(m) {
    const ings = {};
    for (let i = 1; i <= 20; i++) {
      const ing = (m['strIngredient' + i] || '').trim().toLowerCase();
      const measure = (m['strMeasure' + i] || '').trim();
      if (ing) {
        const [amount, unit] = parseMeasure(measure);
        ings[ing] = [amount, unit];
      }
    }
    return {
      key: m.strMeal.toLowerCase(),
      displayName: m.strMeal,
      data: { emoji: guessEmoji(m.strMeal), ingredients: ings },
      fromWeb: true
    };
  }

  // Try multiple search strategies against TheMealDB. Always returns an array
  // (possibly empty). Caches results per query.
  async function searchWebRecipes(term) {
    const key = term.toLowerCase().trim();
    if (!key) return [];
    if (webResults[key]) return webResults[key];

    const tries = [];
    // 1) Whole phrase
    tries.push(key);
    // 2) Each significant word
    const words = key.split(/\s+/).filter(w => w.length >= 4 && !stopWords.has(w));
    for (const w of words) if (!tries.includes(w)) tries.push(w);
    // 3) Swap spaces for hyphens (TheMealDB likes "chicken_handi" style sometimes)
    if (key.includes(' ')) tries.push(key.replace(/\s+/g, '_'));

    const seen = new Set();
    const out = [];

    // Strategy A: name search - most accurate
    for (const t of tries) {
      try {
        const res = await fetch('https://www.themealdb.com/api/json/v1/1/search.php?s=' + encodeURIComponent(t));
        const data = await res.json();
        for (const m of (data.meals || [])) {
          if (!seen.has(m.idMeal)) {
            seen.add(m.idMeal);
            out.push(mealToRecipe(m));
          }
        }
        if (out.length >= 8) break; // enough
      } catch (e) { /* keep trying */ }
    }

    // Strategy B: ingredient filter - finds meals containing the word as an ingredient
    if (out.length < 3) {
      for (const t of tries) {
        try {
          const res = await fetch('https://www.themealdb.com/api/json/v1/1/filter.php?i=' + encodeURIComponent(t.replace(/\s+/g, '_')));
          const data = await res.json();
          const list = (data.meals || []).slice(0, 5);
          // filter.php returns only id+name+thumb - need lookup for full recipe
          const fulls = await Promise.all(list.map(async m => {
            try {
              const r = await fetch('https://www.themealdb.com/api/json/v1/1/lookup.php?i=' + m.idMeal);
              const d = await r.json();
              return d.meals && d.meals[0];
            } catch { return null; }
          }));
          for (const m of fulls) {
            if (m && !seen.has(m.idMeal)) {
              seen.add(m.idMeal);
              out.push(mealToRecipe(m));
            }
          }
          if (out.length >= 6) break;
        } catch (e) { /* keep trying */ }
      }
    }

    // Strategy C: smart guess when web has nothing - always gives user SOMETHING
    if (out.length === 0) {
      out.push(smartGuessRecipe(term));
    }

    webResults[key] = out;
    return out;
  }

  // Smart ingredient guesser: looks at keywords in the recipe name and builds
  // a plausible ingredient list. Used when nothing was found online.
  function smartGuessRecipe(name) {
    const lower = name.toLowerCase();
    const ings = {};

    // Meat / protein keywords
    const meatMap = {
      'chicken': { 'chicken breast': [150, 'g'] },

    const carbMap = {

    // Style / cuisine keywords
    const styleMap = {

      'soup': { 'stock': [400, 'ml'], 'onion': [0.5, 'medium'], 'carrots': [50, 'g'] },

      'wrap': { 'tortilla': [1, 'wrap'], 'lettuce': [20, 'g'], 'mayo': [1, 'tbsp'] },
      'sandwich': { 'bread': [2, 'slices'], 'butter': [10, 'g'], 'lettuce': [15, 'g'] },
      'burger': { 'burger bun': [1, 'bun'], 'lettuce': [2, 'leaves'], 'tomato': [2, 'slices'], 'cheese': [20, 'g'] },
      'pizza': { 'pizza dough': [150, 'g'], 'tomato sauce': [60, 'ml'], 'mozzarella': [60, 'g'] },
      'taco': { 'taco shells': [2, 'shells'], 'lettuce': [30, 'g'], 'cheese': [30, 'g'], 'salsa': [2, 'tbsp'] },
      'roast': { 'potatoes': [200, 'g'], 'carrots': [80, 'g'], 'rosemary': [0.5, 'tsp'] },
      'stew': { 'potatoes': [150, 'g'], 'carrots': [80, 'g'], 'onion': [0.5, 'medium'], 'stock': [300, 'ml'] },
      'pie': { 'pie pastry': [120, 'g'], 'onion': [0.5, 'medium'], 'butter': [15, 'g'] },
      'bake': { 'cheese': [50, 'g'], 'onion': [0.5, 'medium'], 'tomato sauce': [80, 'ml'] },
      'grill': { 'olive oil': [1, 'tbsp'], 'lemon': [0.25, 'lemon'], 'garlic': [1, 'clove'] }
    };
    // Dessert keywords
    const dessertMap = {
      'cake': { 'flour': [80, 'g'], 'sugar': [70, 'g'], 'butter': [50, 'g'], 'eggs': [1, 'whole'], 'baking powder': [0.5, 'tsp'] },
      'cookie': { 'flour': [100, 'g'], 'butter': [50, 'g'], 'sugar': [60, 'g'], 'egg': [0.5, 'whole'] },
      'brownie': { 'chocolate': [60, 'g'], 'butter': [50, 'g'], 'sugar': [60, 'g'], 'flour': [40, 'g'], 'egg': [1, 'whole'] },
      'muffin': { 'flour': [80, 'g'], 'sugar': [50, 'g'], 'butter': [40, 'g'], 'egg': [0.5, 'whole'], 'milk': [40, 'ml'] },
      'pancake': { 'flour': [60, 'g'], 'milk': [100, 'ml'], 'egg': [1, 'whole'], 'butter': [10, 'g'] },
      'pudding': { 'milk': [200, 'ml'], 'sugar': [30, 'g'], 'eggs': [2, 'whole'] },
      'ice cream': { 'cream': [150, 'ml'], 'sugar': [30, 'g'], 'vanilla': [0.5, 'tsp'] },
      'cheesecake': { 'cream cheese': [120, 'g'], 'biscuits': [40, 'g'], 'butter': [30, 'g'], 'sugar': [30, 'g'] }
    };

    const veggieMap = {
      'mushroom': { 'mushrooms': [100, 'g'] },
      'spinach': { 'spinach': [80, 'g'] },

      'aubergine': { 'aubergine': [0.5, 'medium'] },

      'garlic': { 'garlic': [2, 'cloves'] },
      'cheese': { 'cheese': [60, 'g'] },
      'egg': { 'eggs': [2, 'whole'] },
      'chocolate': { 'chocolate': [60, 'g'] }
    };

    const all = [meatMap, carbMap, styleMap, dessertMap, veggieMap];
    for (const map of all) {
      for (const [kw, kwIngs] of Object.entries(map)) {
        if (lower.includes(kw)) Object.assign(ings, kwIngs);
      }
    }

    // Always add base seasonings if nothing matched or for flavor
    if (Object.keys(ings).length === 0) {
      Object.assign(ings, { 'onion': [0.5, 'medium'], 'garlic': [1, 'clove'], 'olive oil': [1, 'tbsp'], 'salt': [0.5, 'tsp'], 'pepper': [0.25, 'tsp'] });
    } else {
      // Add salt & pepper if not there
      if (!ings['salt']) ings['salt'] = [0.5, 'tsp'];
      if (!ings['pepper'] && !ings['black pepper']) ings['pepper'] = [0.25, 'tsp'];
    }

    return {
      key: lower + ' (guess)',
      displayName: name + ' (my guess!)',
      data: { emoji: guessEmoji(name), ingredients: ings },
      fromWeb: true,
      isGuess: true
    };
  }

  // Parse "2 tbsp", "1/2 cup", "200g" etc. -> [amount, unit]
  function parseMeasure(s) {
    if (!s) return [1, ''];
    s = s.trim();
    // Handle fractions like "1/2"
    const fracMatch = s.match(/^(\d+)?\s*(\d+)\/(\d+)\s*(.*)$/);
    if (fracMatch) {
      const whole = parseInt(fracMatch[1] || '0');
      const num = parseInt(fracMatch[2]);
      const den = parseInt(fracMatch[3]);
      const rest = fracMatch[4].trim();
      return [whole + num/den, cleanUnit(rest)];
    }
    const m = s.match(/^([\d.]+)\s*(.*)$/);
    if (m) return [parseFloat(m[1]) || 1, cleanUnit(m[2])];
    return [1, cleanUnit(s)];
  }

  function cleanUnit(u) {
    return (u || '').replace(/\s+/g, ' ').trim().toLowerCase();
  }

  async function doWebSearch() {
    const input = document.getElementById('recipe-name');
    const term = input.value.trim();
    if (term.length < 3) { alert(t('alert_need_type')); return; }
    const btn = document.getElementById('web-search-btn');
    btn.disabled = true;
    btn.textContent = '\u{1F50D} Searching...';
    mascotSetMood('thinking');
    mascotSay(t('mascot_thinking'));

    let results = [];
    try {
      results = await searchWebRecipes(term);
      console.log('[web search] term=', term, 'results=', results);
    } catch (err) {
      console.error('[web search] error:', err);
    }

    btn.disabled = false;
    btn.innerHTML = '\u{1F30D} Search the web';
    lastWebSearch = term.toLowerCase();
    activeRecipeMatch = null;

    // SAFETY NET: if something went wrong and results is empty, force a smart guess
    if (!results || results.length === 0) {
      try {
        const guess = smartGuessRecipe(term);
        results = [guess];
        webResults[lastWebSearch] = results;
      } catch (e) {
        console.error('[web search] smart guess failed:', e);
      }
    } else {
      webResults[lastWebSearch] = results;
    }

    if (!results || results.length === 0) {
      mascotSay(t('mascot_notfound'));
      mascotSetMood('idle', 2000);
    } else {
      const hasRealHits = results.some(r => !r.isGuess);
      if (hasRealHits) {
        const count = results.filter(r => !r.isGuess).length;
        mascotSay(t('mascot_found'));
        mascotSetMood('excited', 2500);
      } else {
        mascotSay(t('mascot_guess'));
        mascotSetMood('thinking', 2500);
      }
      activeRecipeMatch = results[0].key;
    }
    suggestIngredients();
  }

  function suggestIngredients() {
    const name = document.getElementById('recipe-name').value.toLowerCase().trim();
    const sugArea = document.getElementById('suggestions-area');
    const chips = document.getElementById('suggested-chips');
    const matchBar = document.getElementById('match-bar');

    if (name.length < 3) {
      sugArea.style.display = 'none';
      if (matchBar) matchBar.style.display = 'none';
      activeRecipeMatch = null;
      return;
    }

    const nameWords = name.split(/\s+/).filter(w => w.length >= 3 && !stopWords.has(w));
    if (nameWords.length === 0) {
      sugArea.style.display = 'none';
      if (matchBar) matchBar.style.display = 'none';
      activeRecipeMatch = null;
      return;
    }

    // Score every recipe (local + web results if any)
    const scored = [];
    const seenKeys = new Set();
    const scoreRecipe = (key, data, fromWeb = false, displayName = null, forceInclude = false, isGuess = false) => {
      if (seenKeys.has(key)) return;
      const keyWords = key.split(' ').filter(w => w.length >= 3);
      let score = 0;
      for (const nw of nameWords) {
        for (const kw of keyWords) {
          if (kw === nw) score += 10;
          else if (kw.length >= 4 && nw.length >= 4 && (kw.startsWith(nw) || nw.startsWith(kw))) score += 3;
        }
      }
      if (key === name) score += 100;
      else if (key.split(' ').every(w => nameWords.includes(w))) score += 5;
      // Web results get a bonus so they appear near the top
      if (fromWeb && !isGuess) score += 8;
      if (forceInclude || score >= 10) {
        seenKeys.add(key);
        scored.push({ key, data, score, fromWeb, isGuess, displayName: displayName || key });
      }
    };

    for (const [key, data] of Object.entries(recipeDatabase)) {
      scoreRecipe(key, data, false);
    }
    // Include web results - ALWAYS force-show them because the user explicitly asked
    if (lastWebSearch && webResults[lastWebSearch]) {
      for (const w of webResults[lastWebSearch]) {
        scoreRecipe(w.key, w.data, true, w.displayName, true, w.isGuess);
      }
    }

    // Sort best first
    scored.sort((a, b) => b.score - a.score);

    if (scored.length === 0) {
      sugArea.style.display = 'none';
      if (matchBar) matchBar.style.display = 'none';
      activeRecipeMatch = null;
      return;
    }

    // If we haven't locked onto a match yet, pick the top one
    if (!activeRecipeMatch || !scored.some(s => s.key === activeRecipeMatch)) {
      activeRecipeMatch = scored[0].key;
    }
    const active = scored.find(s => s.key === activeRecipeMatch) || scored[0];

    // Build match bar - let user pick between the top matches
    if (matchBar) {
      if (scored.length > 1) {
        matchBar.style.display = 'flex';
        matchBar.innerHTML = '';
        const top = scored.slice(0, 6);
        for (const s of top) {
          const chip = document.createElement('div');
          chip.className = 'chip' + (s.key === activeRecipeMatch ? ' selected' : '');
          const webTag = s.fromWeb ? ' \u{1F30D}' : '';
          chip.textContent = (s.data.emoji || '') + ' ' + s.displayName + webTag;
          chip.onclick = () => { activeRecipeMatch = s.key; suggestIngredients(); };
          matchBar.appendChild(chip);
        }
      } else {
        matchBar.style.display = 'none';
      }
    }

    // Show ingredients for active match
    sugArea.style.display = 'block';
    chips.innerHTML = '';
    const label = document.querySelector('#suggestions-area label');
    if (label) {
      const src = active.fromWeb ? ' (from the web \u{1F30D})' : '';
      label.textContent = `Suggested for "${active.displayName || active.key}"${src} (tap to select)`;
    }
    for (const ing of Object.keys(active.data.ingredients)) {
      const chip = document.createElement('div');
      const sel = currentIngredients.find(i => i.name === ing);
      chip.className = 'chip' + (sel ? ' selected' : '');
      chip.textContent = ing;
      chip.onclick = () => toggleIngredient(ing, active.data.ingredients[ing]);
      chips.appendChild(chip);
    }
  }

  function toggleIngredient(name, qty) {
    const idx = currentIngredients.findIndex(i => i.name === name);
    if (idx >= 0) {
      currentIngredients.splice(idx, 1);
    } else {
      currentIngredients.push({ name, amount: qty ? qty[0] : 1, unit: qty ? qty[1] : '' });
    }
    suggestIngredients();
    renderSelectedIngredients();
  }

  function addCustomIngredient() {
    const input = document.getElementById('custom-ingredient');
    const val = input.value.trim().toLowerCase();
    if (!val || currentIngredients.some(i => i.name === val)) return;
    currentIngredients.push({ name: val, amount: 1, unit: '' });
    input.value = '';
    suggestIngredients();
    renderSelectedIngredients();
  }

  function renderSelectedIngredients() {
    const container = document.getElementById('selected-ingredients');
    container.innerHTML = '';
    for (const ing of currentIngredients) {
      const chip = document.createElement('div');
      chip.className = 'chip selected';
      chip.textContent = ing.name + ' \u2715';
      chip.onclick = () => toggleIngredient(ing.name);
      container.appendChild(chip);
    }
  }

  function saveRecipe() {
    const name = document.getElementById('recipe-name').value.trim();
    if (!name) { alert(t('alert_need_name')); return; }
    if (currentIngredients.length === 0) { alert(t('alert_need_ing')); return; }

    const ingsObj = {};
    currentIngredients.forEach(i => { ingsObj[i.name] = [i.amount, i.unit]; });
    const pickedCat = document.querySelector('input[name="new-cat"]:checked');
    const category = pickedCat ? pickedCat.value : guessCategory(name, ingsObj);

    recipes.push({
      name,
      emoji: guessEmoji(name),
      ingredients: currentIngredients.map(i => ({...i})),
      rating: 0,
      favorite: false,
      category,
      id: Date.now()
    });
    save();
    playSound('add');

    document.getElementById('recipe-name').value = '';
    currentIngredients = [];
    document.getElementById('suggestions-area').style.display = 'none';
    document.getElementById('selected-ingredients').innerHTML = '';
    // reset category picker
    const catInputs = document.querySelectorAll('input[name="new-cat"]');
    catInputs.forEach(i => i.checked = false);
    renderRecipes();
    mascotSay(t('mascot_saved'));
  }

  function deleteRecipe(id) {
    if (!confirm('Delete this recipe?')) return;
    recipes = recipes.filter(r => r.id !== id);
    for (const day of Object.keys(week)) {
      if (week[day] === id) week[day] = null;
    }
    save();
    renderRecipes();
  }

  function toggleFavorite(id) {
    const r = recipes.find(x => x.id === id);
    if (!r) return;
    r.favorite = !r.favorite;
    save();
    renderRecipes();
    playSound('tap');
  }

  function setRating(id, rating) {
    const r = recipes.find(x => x.id === id);
    if (!r) return;
    r.rating = r.rating === rating ? 0 : rating;
    save();
    renderRecipes();
    playSound('tap');
  }

  function setFilter(f) {
    recipeFilter = f;
    ['all', 'fav', 'top'].forEach(k => {
      const el = document.getElementById('filter-' + k);
      if (el) el.classList.toggle('selected', k === f);
    });
    renderRecipes();
  }

  function setCategory(id) {
    activeCategory = id;
    renderCategoryBar();
    renderRecipes();
  }

  function renderCategoryBar() {
    const bar = document.getElementById('category-filter-bar');
    if (!bar) return;
    bar.innerHTML = '';
    for (const c of CATEGORIES) {
      const chip = document.createElement('div');
      chip.className = 'chip' + (activeCategory === c.id ? ' selected' : '');
      chip.textContent = c.emoji + ' ' + t(c.key);
      chip.onclick = () => setCategory(c.id);
      bar.appendChild(chip);
    }
  }

  function recipeCategory(r) {
    return r.category || guessCategory(r.name, (r.ingredients || []).reduce((o, i) => {
      const n = typeof i === 'string' ? i : i.name; o[n] = true; return o;
    }, {}));
  }

  function renderRecipes() {
    const list = document.getElementById('recipes-list');
    let shown = recipes;
    if (recipeFilter === 'fav') shown = recipes.filter(r => r.favorite);
    if (recipeFilter === 'top') shown = [...recipes].sort((a, b) => (b.rating || 0) - (a.rating || 0)).filter(r => r.rating > 0);
    if (activeCategory !== 'all') shown = shown.filter(r => recipeCategory(r) === activeCategory);

    if (shown.length === 0) {
      const catLabel = CATEGORIES.find(c => c.id === activeCategory);
      list.innerHTML = '<div class="empty-state"><div class="emoji">\u{1F373}</div><p>' +
        (recipes.length === 0 ? 'No recipes yet! Add your first one above.' :
         recipeFilter === 'fav' ? 'No favorites yet. Tap the heart on a recipe!' :
         recipeFilter === 'top' ? 'No rated recipes yet. Give them some stars!' :
         activeCategory !== 'all' ? `No ${catLabel ? t(catLabel.key).toLowerCase() : 'recipes'} yet!` :
         'No recipes found.') + '</p></div>';
      return;
    }

    list.innerHTML = '';
    for (let i = 0; i < shown.length; i++) {
      const r = shown[i];
      const card = document.createElement('div');
      card.className = 'recipe-card card-color-' + (i % 5);
      const stars = [1,2,3,4,5].map(n =>
        `<span class="star ${(r.rating||0) >= n ? 'filled' : ''}" onclick="setRating(${r.id}, ${n})">\u2605</span>`
      ).join('');
      const ingHtml = r.ingredients.map(ing => {
        const name = typeof ing === 'string' ? ing : ing.name;
        return `<span class="ingredient-tag">${escHtml(name)}</span>`;
      }).join('');
      const cat = recipeCategory(r);
      const catChip = CATEGORIES.find(c => c.id === cat);
      card.innerHTML = `
        <div class="recipe-card-header">
          <span class="recipe-emoji">${r.emoji || '\u{1F37D}\uFE0F'}</span>
          <h3>${escHtml(r.name)}</h3>
          ${catChip ? `<span class="cat-tag">${catChip.emoji} ${t(catChip.key)}</span>` : ''}
        </div>
        <div class="ingredients">${ingHtml}</div>
        <div class="card-actions">
          <button class="fav-btn" onclick="toggleFavorite(${r.id})">${r.favorite ? '\u2764\uFE0F' : '\u{1F90D}'}</button>
          <div class="star-rating">${stars}</div>
          <button class="delete-btn" onclick="deleteRecipe(${r.id})">\u2715</button>
        </div>
      `;
      list.appendChild(card);
    }
  }

  let spinning = false;

  function setSpinMode(mode) {
    spinMode = mode;
    document.querySelectorAll('.spin-mode-toggle button').forEach(b => b.classList.remove('active'));
    document.getElementById('mode-' + mode).classList.add('active');
  }

  function getSpinPool() {
    if (spinMode === 'fav') return recipes.filter(r => r.favorite);
    if (spinMode === 'surprise') {
      const weekAgo = Date.now() - 7 * 24 * 60 * 60 * 1000;
      const recentIds = new Set(history.filter(h => h.date > weekAgo).map(h => h.recipeId));
      const pool = recipes.filter(r => !recentIds.has(r.id));
      return pool.length > 0 ? pool : recipes;
    }
    return recipes;
  }

  function spinRoulette() {
    if (spinning) return;
    const pool = getSpinPool();
    if (pool.length < 2) {
      alert(spinMode === 'fav' ? 'Need at least 2 favorite recipes!' :
            spinMode === 'surprise' ? 'Need at least 2 recipes you haven\'t had recently!' :
            'Add at least 2 recipes first!');
      return;
    }

    spinning = true;
    const btn = document.getElementById('spin-btn');
    const display = document.getElementById('roulette-display');
    const actions = document.getElementById('spin-actions');
    btn.classList.add('spinning');
    actions.style.display = 'none';
    playSound('spin');

    let count = 0;
    const total = 20 + Math.floor(Math.random() * 10);
    let delay = 80;

    function flip() {
      const r = pool[Math.floor(Math.random() * pool.length)];
      display.innerHTML = `<div class="roulette-card shuffling"><span>${r.emoji || '\u{1F37D}\uFE0F'}</span><span>${escHtml(r.name)}</span></div>`;
      count++;
      if (count < total) {
        delay += count * 3;
        setTimeout(flip, delay);
      } else {
        const winner = pool[Math.floor(Math.random() * pool.length)];
        lastWinner = winner;
        display.innerHTML = `<div class="roulette-card"><span>${winner.emoji || '\u{1F37D}\uFE0F'}</span><span>${escHtml(winner.name)}</span></div>`;
        btn.classList.remove('spinning');
        spinning = false;
        actions.style.display = 'block';
        setTimeout(() => showCelebration(winner), 300);
      }
    }
    flip();
  }

  function showCelebration(recipe) {
    const overlay = document.getElementById('celebration');
    document.getElementById('winner-text').textContent = recipe.name;
    document.getElementById('winner-emoji').textContent = recipe.emoji || '\u{1F37D}\uFE0F';
    overlay.classList.add('active');
    spawnConfetti();
    playSound('win');
    mascotSay(t('mascot_sixseven'));

  function spawnConfetti() {
    const colors = ['#FFB5C2', '#B8E8D0', '#C5B9F2', '#FFDAB3', '#B3D9FF', '#FFF2B3'];
    for (let i = 0; i < 70; i++) {
      const piece = document.createElement('div');
      piece.className = 'confetti-piece';
      piece.style.left = Math.random() * 100 + 'vw';
      piece.style.top = '-10px';
      piece.style.background = colors[Math.floor(Math.random() * colors.length)];
      piece.style.width = (6 + Math.random() * 8) + 'px';
      piece.style.height = (6 + Math.random() * 8) + 'px';
      piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      piece.style.animation = `confettiFall ${1.5 + Math.random() * 2}s ease-out ${Math.random() * 0.5}s forwards`;
      document.body.appendChild(piece);
    }
    setTimeout(() => document.querySelectorAll('.confetti-piece').forEach(el => el.remove()), 4500);
  }

  function logToHistory() {
    if (!lastWinner) return;
    history.unshift({ recipeId: lastWinner.id, name: lastWinner.name, emoji: lastWinner.emoji, date: Date.now() });
    if (history.length > 50) history = history.slice(0, 50);
    save();

  function openCalendarPicker() {

      btn.className = 'modal-recipe-btn';
      const current = week[day] ? recipes.find(r => r.id === week[day]) : null;
      btn.innerHTML = `<strong>${day}</strong> ${current ? '\u2014 ' + (current.emoji||'\u{1F37D}\uFE0F') + ' ' + escHtml(current.name) : '<span style="opacity:0.5">(empty)</span>'}`;
      btn.onclick = () => assignToDay(day);

    if (!pendingDayTarget) return;

  function renderCalendar() {
    const grid = document.getElementById('calendar-grid');
    grid.innerHTML = '';

    for (const day of days) {
      const div = document.createElement('div');
      div.className = 'calendar-day';
      const recipeId = week[day];
      const recipe = recipeId ? recipes.find(r => r.id === recipeId) : null;
      div.innerHTML = `

  function clearDay(day) {

  function autoFillWeek() {
    if (recipes.length === 0) { alert('Add some recipes first!'); return; }
    const days = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
    const weekAgo = Date.now() - 7 * 24 * 60 * 60 * 1000;
    const recentIds = new Set(history.filter(h => h.date > weekAgo).map(h => h.recipeId));
    const fresh = recipes.filter(r => !recentIds.has(r.id));
    const pool = fresh.length >= 3 ? fresh : recipes;
    const shuffled = [...pool].sort(() => Math.random() - 0.5);
    for (let i = 0; i < days.length; i++) {
      week[days[i]] = shuffled[i % shuffled.length].id;
    }
    save();
    renderCalendar();
    mascotSay("Week sorted! \u{1F5D3}\uFE0F");
    playSound('win');
  }

  // Normalize ingredient name -> canonical form
  function normalizeIngredient(rawName) {
    if (!rawName) return '';
    let n = rawName.toLowerCase().trim();
    // Strip simple plurals/extras
    n = n.replace(/\s+/g, ' ');
    if (ingredientAliases[n]) return ingredientAliases[n];
    // Try stripping trailing 's' for naive plurals
    if (n.endsWith('s') && ingredientAliases[n.slice(0, -1)]) return ingredientAliases[n.slice(0, -1)];
    // Try stripping 'es' (tomatoes -> tomato)
    if (n.endsWith('es') && ingredientAliases[n.slice(0, -2)]) return ingredientAliases[n.slice(0, -2)];
    // Substring match (e.g. "crushed tomatoes" -> tomato)
    for (const [alias, canon] of Object.entries(ingredientAliases)) {
      if (n.includes(alias)) return canon;
    }
    return n;
  }

  // ============ SMART UNIT CONVERSIONS ============
  // Convert every unit to a "base unit" so we can add them up.
  // Returns [amountInBase, baseUnit] or null if we can't convert.
  function toBase(amount, unit) {
    const u = (unit || '').toLowerCase().trim();
    // Weight -> grams
    if (u === 'g' || u === 'gram' || u === 'grams') return [amount, 'g'];
    if (u === 'kg' || u === 'kilo' || u === 'kilos' || u === 'kilogram' || u === 'kilograms') return [amount * 1000, 'g'];
    // Volume -> ml
    if (u === 'ml' || u === 'milliliter' || u === 'millilitre') return [amount, 'ml'];
    if (u === 'l' || u === 'liter' || u === 'litre' || u === 'liters' || u === 'litres') return [amount * 1000, 'ml'];
    // Spoons -> ml (approx)
    if (u === 'tsp' || u === 'teaspoon' || u === 'teaspoons') return [amount * 5, 'ml-spoon'];
    if (u === 'tbsp' || u === 'tablespoon' || u === 'tablespoons') return [amount * 15, 'ml-spoon'];
    // Counted items keep their unit
    return null;
  }

  // Convert from base back to the "best" display unit
  function fromBase(amount, baseUnit) {
    if (baseUnit === 'g') {
      if (amount >= 1000) return [+(amount / 1000).toFixed(2), 'kg'];
      return [Math.round(amount), 'g'];
    }
    if (baseUnit === 'ml') {
      if (amount >= 1000) return [+(amount / 1000).toFixed(2), 'L'];
      return [Math.round(amount), 'ml'];
    }
    if (baseUnit === 'ml-spoon') {
      // Convert back to tbsp/tsp nicely
      if (amount >= 45) { // 3+ tbsp -> use tbsp
        const tbsp = amount / 15;
        return [Math.round(tbsp * 2) / 2, 'tbsp'];
      }
      if (amount >= 15) {
        return [Math.round((amount / 15) * 2) / 2, 'tbsp'];
      }
      return [Math.round((amount / 5) * 2) / 2, 'tsp'];
    }
    return [amount, baseUnit];
  }

  function generateGroceryList() {
    const mealIds = Object.values(week).filter(x => x);
    if (mealIds.length === 0) {
      document.getElementById('grocery-list').innerHTML = '<div class="empty-state"><div class="emoji">\u{1F6D2}</div><p>Add some meals to your week first!</p></div>';
      return;
    }

    // combined[canonicalName] = { name, buckets: { baseUnit: amount, ... }, countedUnits: { unit: amount } }
    const combined = {};
    for (const id of mealIds) {
      const recipe = recipes.find(r => r.id === id);
      if (!recipe) continue;
      for (const ing of recipe.ingredients) {
        const rawName = typeof ing === 'string' ? ing : ing.name;
        const amount = typeof ing === 'string' ? null : ing.amount;
        const unit = typeof ing === 'string' ? '' : ing.unit;
        const canonName = normalizeIngredient(rawName);

        if (!combined[canonName]) {
          combined[canonName] = { name: canonName, buckets: {}, countedUnits: {}, hasAmount: false };
        }
        const entry = combined[canonName];

        if (amount == null) continue;
        const scaledAmount = amount * settings.familySize;
        entry.hasAmount = true;

        const base = toBase(scaledAmount, unit);
        if (base) {
          // Mergeable unit (g, ml, spoons)
          const [amt, bUnit] = base;
          entry.buckets[bUnit] = (entry.buckets[bUnit] || 0) + amt;
        } else {
          // Counted (e.g. "2 slices", "3 cloves") - add by unit
          const u = unit || 'whole';
          entry.countedUnits[u] = (entry.countedUnits[u] || 0) + scaledAmount;
        }
      }
    }

    // Sort names alphabetically
    const sorted = Object.keys(combined).sort();
    groceryChecked = groceryChecked.filter(g => sorted.includes(g));
    save();

    const list = document.getElementById('grocery-list');
    list.innerHTML = '';
    document.getElementById('people-count').textContent = settings.familySize;

    if (sorted.length === 0) {
      list.innerHTML = '<div class="empty-state"><div class="emoji">\u{1F6D2}</div><p>Add some meals to your week first!</p></div>';
      return;
    }

    for (const key of sorted) {
      const item = combined[key];
      const div = document.createElement('div');
      div.className = 'grocery-item' + (groceryChecked.includes(key) ? ' checked' : '');

      // Build amount string from buckets + countedUnits
      const parts = [];
      for (const [baseUnit, amt] of Object.entries(item.buckets)) {
        const [displayAmt, displayUnit] = fromBase(amt, baseUnit);
        parts.push(displayAmt + (displayUnit ? ' ' + displayUnit : ''));
      }
      for (const [u, amt] of Object.entries(item.countedUnits)) {
        const prettyAmt = Math.ceil(amt * 2) / 2;
        parts.push(prettyAmt + (u && u !== 'whole' ? ' ' + u : ''));
      }
      const amountStr = item.hasAmount ? parts.join(' + ') : '';

      div.innerHTML = `
        <div class="grocery-check">${groceryChecked.includes(key) ? '\u2713' : ''}</div>
        <span>${escHtml(item.name)}</span>
        ${amountStr ? `<span class="grocery-amount">${amountStr}</span>` : ''}
      `;
      div.onclick = () => {
        const idx = groceryChecked.indexOf(key);
        if (idx >= 0) groceryChecked.splice(idx, 1);
        else groceryChecked.push(key);
        save();
        generateGroceryList();
      };
      list.appendChild(div);
    }
  }

  function formatAmount(amount, unit) {
    if (unit === 'g' || unit === 'ml') {
      if (amount >= 1000) {
        const bigUnit = unit === 'g' ? 'kg' : 'L';
        return (amount / 1000).toFixed(1).replace('.0', '') + ' ' + bigUnit;
      }
      return Math.round(amount) + ' ' + unit;
    }
    return Math.ceil(amount * 2) / 2 + (unit ? ' ' + unit : '');
  }

  function setFamilySize() {
    const val = parseInt(document.getElementById('family-size-input').value) || 1;
    settings.familySize = Math.max(1, Math.min(20, val));

  function updateSettingsUI() {
    document.getElementById('family-size-input').value = settings.familySize;

  function clearAllData() {
    if (!confirm('This will delete ALL your recipes, history, and settings. Are you sure?')) return;
    if (!confirm('Really sure? This cannot be undone!')) return;
    localStorage.clear();
    location.reload();
  }

  let audioCtx = null;
  function playSound(type) {
    if (!settings.sound) return;
    try {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const now = audioCtx.currentTime;
      const freqs = {
        tap: [[800, 0.08]],
        add: [[523, 0.1], [659, 0.1], [784, 0.12]],
        spin: [[200, 0.05], [300, 0.05], [400, 0.05], [500, 0.05], [600, 0.05]],
        win: [[523, 0.15], [659, 0.15], [784, 0.15], [1047, 0.3]],
      };
      const seq = freqs[type] || freqs.tap;
      let t = now;
      for (const [freq, dur] of seq) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.frequency.value = freq;
        osc.type = 'sine';
        gain.gain.setValueAtTime(0.15, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(t);
        osc.stop(t + dur);
        t += dur;
      }
    } catch (e) {}
  }

  // Idle mood messages by mood
  const moodTimeouts = { current: null };

  function mascotSetMood(mood, durationMs) {
    const el = document.getElementById('mascot');
    if (!el) return;
    // Remove all mood classes
    el.classList.remove('excited', 'thinking', 'sleepy');
    el.setAttribute('data-mood', mood);
    if (mood === 'excited' || mood === 'thinking' || mood === 'sleepy') {
      el.classList.add(mood);
    }
    if (moodTimeouts.current) clearTimeout(moodTimeouts.current);
    if (durationMs) {
      moodTimeouts.current = setTimeout(() => mascotSetMood('idle'), durationMs);
    }
  }

  function mascotPoke() {
    const joke = mascotJokes[Math.floor(Math.random() * mascotJokes.length)];
    mascotSay(joke);
    mascotSetMood('happy', 2500);
    playSound('tap');
  }

  // After 30s of idleness, get sleepy
  let lastActivityAt = Date.now();
  function bumpActivity() {
    lastActivityAt = Date.now();
    const el = document.getElementById('mascot');
    if (el && el.classList.contains('sleepy')) mascotSetMood('idle');
  }
  document.addEventListener('click', bumpActivity);
  document.addEventListener('keydown', bumpActivity);
  setInterval(() => {
    if (Date.now() - lastActivityAt > 30000) {
      const el = document.getElementById('mascot');
      if (el && el.getAttribute('data-mood') === 'idle') {
        mascotSetMood('sleepy');
      }
    }
  }, 5000);

  let mascotMessages = getIdleMessages();
  function mascotSay(msg) {
    const el = document.getElementById('mascot-speech');
    el.textContent = msg;
    setTimeout(() => {
      el.textContent = mascotMessages[Math.floor(Math.random() * mascotMessages.length)];
    }, 3000);
  }

  function showPage(name) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page-' + name).classList.add('active');
    const btns = document.querySelectorAll('.nav button');
    const pages = ['recipes', 'spin', 'calendar', 'grocery', 'settings'];
    btns.forEach((b, i) => b.classList.toggle('active', pages[i] === name));
    if (name === 'calendar') renderCalendar();
    if (name === 'grocery') generateGroceryList();
    if (name === 'settings') updateSettingsUI();
    playSound('tap');
  }

  function escHtml(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  document.getElementById('recipe-name').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('custom-ingredient').focus();
  });
  document.getElementById('custom-ingredient').addEventListener('keydown', e => {
    if (e.key === 'Enter') addCustomIngredient();
  });

  // Migrate old recipes (string ingredients) to new format
  for (const r of recipes) {
    if (!r.emoji) r.emoji = guessEmoji(r.name);
    if (r.rating === undefined) r.rating = 0;
    if (r.favorite === undefined) r.favorite = false;
    r.ingredients = r.ingredients.map(ing => typeof ing === 'string' ? { name: ing, amount: 1, unit: '' } : ing);
  }
  save();

  applyTheme();
  updateSettingsUI();
  setFilter('all');
  renderCategoryBar();
  renderRecipes();
  applyLanguage();
  // Sync language picker dropdown to current language
  const langSel = document.getElementById('lang-select');
  if (langSel) langSel.value = settings.lang || 'en';
